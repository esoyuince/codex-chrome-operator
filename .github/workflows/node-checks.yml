name: Node Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Syntax and Version Discipline
        run: npm run check

      - name: Unit Tests
        run: npm test

      - name: M1 Release Gates
        run: npm run release:m1

      - name: M6 Sandbox Install Gates
        run: npm run release:m6 -- --skip-clean-smoke
