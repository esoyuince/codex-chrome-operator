<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Codex Operator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="popup">
    <header class="popup-header">
      <div>
        <h1>Codex Operator</h1>
        <p id="summary">Checking Chrome operator status...</p>
      </div>
      <span id="status-badge" class="badge badge-warn">Checking</span>
    </header>

    <section class="status-grid" aria-label="Operator readiness">
      <article class="status-card">
        <div class="label">Native bridge</div>
        <div id="connection" class="value">Checking...</div>
        <div id="native-error" class="detail">No native error reported.</div>
      </article>

      <article class="status-card">
        <div class="label">Profile binding</div>
        <div id="profile-state" class="value">Checking...</div>
        <div id="profile-detail" class="detail">Reading chrome.storage.local...</div>
      </article>

      <article class="status-card wide">
        <div class="label">Active tab</div>
        <div id="active-tab-title" class="value">Checking...</div>
        <dl class="compact-list">
          <dt>Origin</dt>
          <dd id="active-tab-origin">...</dd>
          <dt>Loading</dt>
          <dd id="active-tab-loading">...</dd>
          <dt>Host access</dt>
          <dd id="host-permission">...</dd>
        </dl>
      </article>
    </section>

    <section class="next-step" aria-live="polite">
      <div class="label">Next step</div>
      <p id="next-step">Checking what needs attention...</p>
    </section>

    <div class="actions">
      <button id="connect" type="button">Connect</button>
      <button id="grant-host" type="button" class="secondary" hidden>Grant host access</button>
      <button id="refresh" type="button" class="secondary">Refresh</button>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
